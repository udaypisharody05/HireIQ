services:
  db:
    image: postgres:16-alpine
    container_name: hireiq-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hireiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hireiq}
      POSTGRES_DB: ${POSTGRES_DB:-hireiq}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hireiq} -d ${POSTGRES_DB:-hireiq}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: hireiq-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://hireiq:hireiq@db:5432/hireiq}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: hireiq-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  postgres_data:
